name: 🚀 Web Testing Suite Runner

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'The website URL to test'
        required: true
        default: 'https://example.com'
        type: string

jobs:
  execute-suite:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: |
          npm config set puppeteer_skip_download true
          npm install --no-audit --no-fund

      - name: ⚙️ Generate Config File
        run: |
          cp config.template.json config.json
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            
            if (config.url) { config.url = '${{ github.event.inputs.target_url }}'; }
            else if (config.target && config.target.url) { config.target.url = '${{ github.event.inputs.target_url }}'; }
            else { config.targetUrl = '${{ github.event.inputs.target_url }}'; }
            
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          "

      - name: 🧪 Run Web Testing Suite
        run: node test-runner.js

      - name: 📊 Display Live Summary Online
        if: always()
        run: |
          echo "## 📊 Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Target Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Tested** | ${{ github.event.inputs.target_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Completed ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Detailed Logs" >> $GITHUB_STEP_SUMMARY
          echo "To view detailed event outputs or script verification metrics, check the build logs above or your local generated files." >> $GITHUB_STEP_SUMMARY
