name: 🚀 Web Testing Suite Runner

on:
  workflow_dispatch:

jobs:
  execute-suite:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --no-audit --no-fund

      - name: ⚙️ Prepare Config File
        run: |
          if [ -f config.template.json ]; then
            cp config.template.json config.json
          fi

      - name: 🧪 Run Web Testing Suite
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node test-runner.js

      - name: 📊 Display Live Summary Online (Both Tables)
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const summaryFile = process.env.GITHUB_STEP_SUMMARY;
            const reportFile = 'report.json'; 

            if (!fs.existsSync(reportFile)) {
              fs.appendFileSync(summaryFile, '## 📊 Test Run Summary\n\n⚠️ **Error:** \`report.json\` file not found. Ensure your framework exports execution results to this path.');
              process.exit(0);
            }

            const data = JSON.parse(fs.readFileSync(reportFile, 'utf8'));
            let markdown = '';

            // --- TABLE 1: RUN-SCRIPT-CHECKS SUMMARY ---
            markdown += '## 📋 run-script-checks summary\n\n';
            markdown += '| URL | Missing Scripts | Error |\n';
            markdown += '| --- | --- | --- |\n';
            
            data.forEach(row => {
              const url = row.url || 'N/A';
              let missing = 'None ✅';
              if (row.missingScripts && row.missingScripts.length > 0) {
                missing = Array.isArray(row.missingScripts) ? row.missingScripts.map(s => \`\`\\\`\${s}\`\`\`).join(', ') : row.missingScripts;
              }
              const error = row.error || '—';
              markdown += \`| \${url} | \${missing} | \${error} |\n\`;
            });

            markdown += '\n---\n\n'; 

            // --- TABLE 2: RUN-DATALAYER-CHECKS SUMMARY ---
            markdown += '## 📊 run-datalayer-checks summary\n\n';
            markdown += '| URL | didomi-consent | didomi-ready | view_item_list | Error |\n';
            markdown += '| --- | --- | --- | --- | --- |\n';

            data.forEach(row => {
              const url = row.url || 'N/A';
              
              const hasDidomiConsent = row.events && (row.events['didomi-consent'] || row.events.didomi_consent);
              const hasDidomiReady = row.events && (row.events['didomi-ready'] || row.events.didomi_ready);
              const hasViewItemList = row.events && (row.events['view_item_list'] || row.events.view_item_list);

              const didomiConsent = hasDidomiConsent ? '✅' : '❌';
              const didomiReady = hasDidomiReady ? '✅' : '❌';
              const viewItemList = hasViewItemList ? '✅' : '❌';
              const error = row.error || '—';

              markdown += \`| \${url} | \${didomiConsent} | \${didomiReady} | \${viewItemList} | \${error} |\n\`;
            });

            fs.appendFileSync(summaryFile, markdown);
          "
