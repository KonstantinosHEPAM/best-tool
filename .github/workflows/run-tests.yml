name: 🚀 Parallel Web Testing Suite

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      urls: ${{ steps.get-urls.outputs.urls }}
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Extract URLs from Config
        id: get-urls
        run: |
          URLS_JSON=$(node -e "
            const fs = require('fs');
            const file = fs.existsSync('config.template.json') ? 'config.template.json' : 'config.json';
            if (fs.existsSync(file)) {
              const config = JSON.parse(fs.readFileSync(file, 'utf8'));
              console.log(JSON.stringify(config.urls || []));
            } else {
              console.log('[]');
            }
          ")
          echo "urls=${URLS_JSON}" >> $GITHUB_OUTPUT

  execute-suite:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10  
      matrix:
        target_url: ${{ fromJson(needs.prepare-matrix.outputs.urls) }}

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --no-audit --no-fund

      - name: ⚙️ Generate Config for Single URL
        run: |
          node -e "
            const fs = require('fs');
            const file = fs.existsSync('config.template.json') ? 'config.template.json' : 'config.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            config.urls = ['${{ matrix.target_url }}'];
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          "

      - name: 🧪 Run Web Testing Suite & Capture Output
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          NODE_ENV: production
        run: node test-runner.js > console_output.txt 2>&1 || true

      - name: 💾 Stash Console Output Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ strategy.job-index }}
          path: console_output.txt
          retention-days: 1

  generate-summary:
    needs: execute-suite
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⬇️ Download All Log Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: log-*
          path: all-logs

      - name: 📊 Parse Console Outputs & Build Markdown Tables
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const summaryFile = process.env.GITHUB_STEP_SUMMARY;
            const dir = 'all-logs';
            
            let markdown = '## 📋 run-script-checks summary\n\n';
            markdown += '| URL | Missing Scripts | Status |\n';
            markdown += '| --- | --- | --- |\n';
            
            let datalayerMarkdown = '## 📊 run-datalayer-checks summary\n\n';
            datalayerMarkdown += '| URL | didomi-consent | didomi-ready | view_item_list |\n';
            datalayerMarkdown += '| --- | --- | --- | --- |\n';

            if (fs.existsSync(dir)) {
              const folders = fs.readdirSync(dir);
              
              folders.forEach(folder => {
                const logPath = path.join(dir, folder, 'console_output.txt');
                if (fs.existsSync(logPath)) {
                  const logContent = fs.readFileSync(logPath, 'utf8');
                  
                  let currentUrl = 'Unknown URL';
                  const urlMatch = logContent.match(/https:\/\/www\.msc[^\s'\"]+/);
                  if (urlMatch) currentUrl = urlMatch.replace(/%20/g, ' ');

                  let missingArr = [];
                  if (logContent.toLowerCase().includes('google tag manager') && (logContent.toLowerCase().includes('missing') || logContent.toLowerCase().includes('not found') || logContent.includes('❌'))) {
                    missingArr.push('Google Tag Manager');
                  }
                  if (logContent.toLowerCase().includes('privacy center') && (logContent.toLowerCase().includes('missing') || logContent.toLowerCase().includes('not found') || logContent.includes('❌'))) {
                    missingArr.push('Privacy Center');
                  }
                  if (logContent.toLowerCase().includes('analytics') && (logContent.toLowerCase().includes('missing') || logContent.toLowerCase().includes('not found') || logContent.includes('❌'))) {
                    missingArr.push('Analytics');
                  }
                  
                  let missing = missingArr.length > 0 ? missingArr.join(', ') : 'None ✅';
                  let status = 'Success ✅';
                  if (logContent.includes('ERROR') || logContent.includes('TimeoutError') || logContent.includes('failed') || logContent.includes('ERR_')) {
                    status = '⚠️ Failed';
                  }
                  
                  markdown += '| ' + currentUrl + ' | ' + missing + ' | ' + status + ' |\n';

                  const didomiConsent = logContent.includes('didomi-consent') || logContent.includes('didomi_consent') || logContent.includes('consent_changed') ? '✅' : '❌';
                  const didomiReady = logContent.includes('didomi-ready') || logContent.includes('didomi_ready') ? '✅' : '❌';
                  const viewItemList = logContent.includes('view_item_list') || logContent.includes('view_item') ? '✅' : '❌';
                  
                  datalayerMarkdown += '| ' + currentUrl + ' | ' + didomiConsent + ' | ' + didomiReady + ' | ' + viewItemList + ' |\n';
                }
              });
            }

            fs.writeFileSync(summaryFile, markdown + '\n---\n\n' + datalayerMarkdown);
          "
