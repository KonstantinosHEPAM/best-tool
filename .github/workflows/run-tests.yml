name: 🚀 Web Testing Suite Runner

on:
  workflow_dispatch:

jobs:
  execute-suite:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --no-audit --no-fund

      - name: ⚙️ Prepare Config File
        run: |
          if [ -f config.template.json ]; then
            cp config.template.json config.json
          fi

      - name: 🧪 Run Web Testing Suite
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node test-runner.js

      - name: 📊 Display Live Summary Online
        if: always()
        run: |
          echo "## 📊 Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Execution Mode |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Completed ✅ | All MSC Production URLs |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Production Suite Output" >> $GITHUB_STEP_SUMMARY
          echo "The framework targeted the multi-region ecosystem mapped inside your config file." >> $GITHUB_STEP_SUMMARY
