name: 🚀 Parallel Web Testing Suite

on:
  workflow_dispatch:

jobs:
  # JOB 1: Read config and dynamically extract URLs for the Matrix
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      urls: ${{ steps.get-urls.outputs.urls }}
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Extract URLs from Config
        id: get-urls
        run: |
          URLS_JSON=$(node -e "
            const fs = require('fs');
            const file = fs.existsSync('config.template.json') ? 'config.template.json' : 'config.json';
            if (fs.existsSync(file)) {
              const config = JSON.parse(fs.readFileSync(file, 'utf8'));
              console.log(JSON.stringify(config.urls || []));
            } else {
              console.log('[]');
            }
          ")
          echo "urls=${URLS_JSON}" >> $GITHUB_OUTPUT

  # JOB 2: Execute tests in PARALLEL using GitHub Matrix
  execute-suite:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10  
      matrix:
        target_url: ${{ fromJson(needs.prepare-matrix.outputs.urls) }}

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install --no-audit --no-fund

      - name: ⚙️ Generate Config for Single URL
        run: |
          node -e "
            const fs = require('fs');
            const file = fs.existsSync('config.template.json') ? 'config.template.json' : 'config.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            config.urls = ['${{ matrix.target_url }}'];
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          "

      - name: 🧪 Run Web Testing Suite
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node test-runner.js

      - name: 💾 Stash Temporary Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ strategy.job-index }}
          path: report.json
          retention-days: 1

  # JOB 3: Collect all stashed reports and compile the Online Summary Tables
  generate-summary:
    needs: execute-suite
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⬇️ Download All Temporary Reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: all-reports

      - name: 📊 Compile and Display Both Tables Live
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const summaryFile = process.env.GITHUB_STEP_SUMMARY;
            const dir = 'all-reports';
            
            let combinedData = [];
            
            if (fs.existsSync(dir)) {
              const folders = fs.readdirSync(dir);
              folders.forEach(folder => {
                const filePath = path.join(dir, folder, 'report.json');
                if (fs.existsSync(filePath)) {
                  try {
                    const content = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                    if (Array.isArray(content)) {
                      combinedData = combinedData.concat(content);
                    } else {
                      combinedData.push(content);
                    }
                  } catch (e) {
                    console.error('Error parsing: ' + filePath, e);
                  }
                }
              });
            }

            let markdown = '';

            // --- TABLE 1: RUN-SCRIPT-CHECKS SUMMARY ---
            markdown += '## 📋 run-script-checks summary\n\n';
            markdown += '| URL | Missing Scripts | Error |\n';
            markdown += '| --- | --- | --- |\n';
            
            combinedData.forEach(row => {
              const url = row.url || row.target || 'N/A';
              
              // Smart-fallback for missing scripts property names
              let rawMissing = row.missingScripts || row.missing_scripts || row.missing || [];
              let missing = 'None ✅';
              if (Array.isArray(rawMissing) && rawMissing.length > 0) {
                missing = rawMissing.join(', ');
              } else if (typeof rawMissing === 'string' && rawMissing.trim().length > 0) {
                missing = rawMissing;
              }
              
              const error = row.error || '—';
              markdown += '| ' + url + ' | ' + missing + ' | ' + error + ' |\n';
            });

            markdown += '\n---\n\n'; 

            // --- TABLE 2: RUN-DATALAYER-CHECKS SUMMARY ---
            markdown += '## 📊 run-datalayer-checks summary\n\n';
            markdown += '| URL | didomi-consent | didomi-ready | view_item_list | Error |\n';
            markdown += '| --- | --- | --- | --- | --- |\n';

            combinedData.forEach(row => {
              const url = row.url || row.target || 'N/A';
              
              // Smart lookup for event states inside objects or sub-arrays
              const searchEvent = (evtName) => {
                if (!row.events) return false;
                if (typeof row.events === 'object' && !Array.isArray(row.events)) {
                  return row.events[evtName] || row.events[evtName.replace(/-/g, '_')] || false;
                }
                if (Array.isArray(row.events)) {
                  return row.events.some(e => e === evtName || (e && (e.name === evtName || e.event === evtName)));
                }
                return false;
              };

              const didomiConsent = searchEvent('didomi-consent') ? '✅' : '❌';
              const didomiReady = searchEvent('didomi-ready') ? '✅' : '❌';
              const viewItemList = searchEvent('view_item_list') ? '✅' : '❌';
              const error = row.error || '—';

              markdown += '| ' + url + ' | ' + didomiConsent + ' | ' + didomiReady + ' | ' + viewItemList + ' | ' + error + ' |\n';
            });

            fs.writeFileSync(summaryFile, markdown);
          "
